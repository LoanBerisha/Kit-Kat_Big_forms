<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>KitKat – Récapitulatif</title>
  </head>
  <body>
    <div class="card">
      <div class="step" id="step-3">
        <header class="card-header">
          <img
            src="Image/Logo_of_the_KitKat.svg 2.png"
            alt="KitKat"
            class="logo"
          />
          <h1 class="header-title">Avis Clients</h1>
        </header>

        <div class="progress-bar">
          <div class="dot active"></div>
          <div class="line active"></div>
          <div class="dot active"></div>
          <div class="line active"></div>
          <div class="dot active"></div>
        </div>

        <div class="step-content">
          <h2 class="section-title">Récapitulatif</h2>

          <div class="recap-item" id="recap-nom"></div>
          <div class="recap-item" id="recap-email"></div>
          <div class="recap-item" id="recap-age"></div>
          <div class="recap-item" id="recap-produit"></div>
          <div class="recap-item" id="recap-note"></div>
          <div class="recap-item" id="recap-commentaire"></div>

          <button class="submit-btn" onclick="submitForm()">envoyer</button>
        </div>

        <div class="nav-row">
          <a href="step2.html" class="nav-btn">
            <img src="Image/ArrowRight.png" alt="Précédent" />
          </a>
        </div>
        <img
          src="Image/shape de gauche.png"
          class="shape shape-left"
          alt="Shape ondulée rouge gauche"
        />
        <img
          src="Image/Vecteur 3.png"
          class="shape shape-right"
          alt="Shape ondulée rouge droite"
        />
      </div>
    </div>

    <script src="step3.js"></script>
  </body>
</html>
