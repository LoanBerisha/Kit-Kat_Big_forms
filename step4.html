<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>KitKat – Merci !</title>
  </head>
  <body>
    <div class="card">
      <div class="step" id="step-4">
        <header class="card-header">
          <img
            src="Image/Logo_of_the_KitKat.svg 2.png"
            alt="KitKat"
            class="logo"
          />
          <h1 class="header-title">Avis Clients</h1>
        </header>

        <div class="progress-bar">
          <div class="dot active"></div>
          <div class="line active"></div>
          <div class="dot active"></div>
          <div class="line active"></div>
          <div class="dot active"></div>
        </div>

        <div class="step-content success-content">
          <div class="success-icon">✓</div>
          <h2 class="success-title">Merci pour votre avis !</h2>
          <p class="success-text">
            Votre avis a bien été envoyé. Nous vous remercions de prendre le
            temps de partager votre expérience avec KitKat.
          </p>
          <a href="index.html" class="submit-btn">Nouvel avis</a>
        </div>

        <img
          src="Image/shape de gauche.png"
          class="shape shape-left"
          alt="Shape ondulée rouge gauche"
        />
        <img
          src="Image/Vecteur 3.png"
          class="shape shape-right"
          alt="Shape ondulée rouge droite"
        />
      </div>
    </div>
  </body>
</html>
